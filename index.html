<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca Digital de Sistemas Informáticos</title>
    <style>
        :root {
            --bg-principal: #0f172a;
            --bg-tarjeta: #1e293b;
            --texto-principal: #f8fafc;
            --texto-secundario: #94a3b8;
            --accento: #10b981;
            --accento-hover: #059669;
            --azul-tech: #3b82f6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto-principal);
            padding-bottom: 50px;
        }

        header {
            background: linear-gradient(135deg, #1e1b4b, #0f172a);
            padding: 40px 20px;
            text-align: center;
            border-bottom: 3px solid var(--accento);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        header h1 {
            font-size: 2.5rem;
            color: var(--texto-principal);
            margin-bottom: 10px;
        }

        header h1 span {
            color: var(--accento);
        }

        header p {
            color: var(--texto-secundario);
            font-size: 1.1rem;
        }

        .contenedor-herramientas {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .caja-busqueda {
            width: 100%;
            padding: 15px 20px;
            border-radius: 8px;
            border: 2px solid var(--bg-tarjeta);
            background-color: var(--bg-tarjeta);
            color: white;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        .caja-busqueda:focus {
            outline: none;
            border-color: var(--azul-tech);
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }

        .filtros-categoria {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .btn-filtro {
            padding: 10px 18px;
            border: none;
            border-radius: 20px;
            background-color: var(--bg-tarjeta);
            color: var(--texto-secundario);
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-filtro:hover, .btn-filtro.activo {
            background-color: var(--azul-tech);
            color: white;
        }

        .galeria-libros {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .tarjeta-libro {
            background-color: var(--bg-tarjeta);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-top: 4px solid var(--azul-tech);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .tarjeta-libro:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }

        .tag-categoria {
            align-self: flex-start;
            background-color: rgba(16, 185, 129, 0.2);
            color: var(--accento);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        .titulo-libro {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .autor-libro {
            color: var(--texto-secundario);
            font-size: 0.95rem;
            margin-bottom: 15px;
            flex-grow: 1;
        }

        .metadatos {
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 15px;
            margin-bottom: 15px;
            font-size: 0.85rem;
            color: var(--texto-secundario);
        }

        .btn-descargar {
            display: block;
            text-align: center;
            background-color: var(--accento);
            color: white;
            padding: 12px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            transition: background-color 0.2s ease;
        }

        .btn-descargar:hover {
            background-color: var(--accento-hover);
        }

        .sin-resultados {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            color: var(--texto-secundario);
            font-size: 1.2rem;
        }
    </style>

        let categoriaActual = 'todos';

        function mostrarLibros() {
            const galeria = document.getElementById('galeria');
            const terminoBusqueda = document.getElementById('buscador').value.toLowerCase();
            galeria.innerHTML = '';

            const librosFiltrados = libros.filter(libro => {
                const coincideCategoria = (categoriaActual === 'todos' || libro.categoria === categoriaActual);
                const coincideTexto = libro.titulo.toLowerCase().includes(terminoBusqueda) || 
                                     libro.autor.toLowerCase().includes(terminoBusqueda);
                return coincideCategoria && coincideTexto;
            });

            if (librosFiltrados.length === 0) {
                galeria.innerHTML = `<div class="sin-resultados">No se encontraron libros que coincidan con la búsqueda.</div>`;
                return;
            }

            librosFiltrados.forEach(libro => {
                const tarjeta = document.createElement('div');
                tarjeta.className = 'tarjeta-libro';
                tarjeta.innerHTML = `
                    <div>
                        <span class="tag-categoria">${libro.categoria}</span>
                        <div class="titulo-libro">${libro.titulo}</div>
                        <div class="autor-libro">Por: ${libro.autor}</div>
                    </div>
                    <div>
                        <div class="metadatos">
                            <div><strong>Editorial:</strong> ${libro.editorial}</div>
                            <div><strong>Año:</strong> ${libro.anio}</div>
                        </div>
                        <a href="${libro.enlace}" target="_blank" class="btn-descargar">📖 Ver / Descargar</a>
                    </div>
                `;
                galeria.appendChild(tarjeta);
            });
        }

        function filtrarCategoria(categoria) {
            categoriaActual = categoria;
            
            // Actualizar botones de filtro activos
            const botones = document.querySelectorAll('.btn-filtro');
            botones.forEach(btn => btn.classList.remove('activo'));
            
            event.target.classList.add('activo');
            mostrarLibros();
        }

        // Listener del buscador
        document.getElementById('buscador').addEventListener('input', mostrarLibros);

        // Render inicial
        mostrarLibros();
